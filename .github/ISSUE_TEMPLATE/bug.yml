name: Bug report
description: Reproducible failure in the CLI, MCP server, or plugin.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: One sentence is fine.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: How do we reproduce it?
      description: Exact commands, inputs, and environment. Paste error output verbatim in a code block.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen instead?

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `compos --version` (or plugin version from `/plugin list`).
      placeholder: compos 0.1.1
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Where did it happen?
      options:
        - compos-cli
        - compos-mcp (standalone)
        - Claude Code plugin
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS + Python version
      placeholder: macOS 14.5 / Python 3.13
